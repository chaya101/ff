<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fdg</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 2rem;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff, #f78166);
    }

    .project-name {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }

    .tagline {
      color: #8b949e;
      font-size: 1rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .divider {
      border: none;
      border-top: 1px solid #21262d;
      margin: 2rem 0;
    }

    .repo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .repo-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8b949e;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      text-decoration: none;
      color: #58a6ff;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Courier New', Courier, monospace;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .repo-link:hover {
      background: #30363d;
      border-color: #58a6ff;
      color: #79c0ff;
    }

    .repo-link svg {
      flex-shrink: 0;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      border: none;
    }

    .btn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #ffffff;
    }

    .btn-secondary {
      background: transparent;
      color: #e6edf3;
      border: 1px solid #30363d;
    }

    .btn-secondary:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 1.5rem 1rem;
      border-top: 1px solid #21262d;
      color: #8b949e;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
    }

    footer span {
      color: #bc8cff;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }
      .project-name {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="badge">&#10022; Open Source Project</div>

    <div class="card">
      <div class="project-name">fdg</div>
      <p class="tagline">A modern project built for performance,<br />simplicity, and scale.</p>

      <hr class="divider" />

          ff

      </div>

      <div class="actions">
        <a href="#" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 0a8 8 0 1 0 0 16A8 8 0 0 0 8 0zm3.5 7.5-5 3A.5.5 0 0 1 6 10V6a.5.5 0 0 1 .757-.429l5 2.5a.5.5 0 0 1 0 .858z"/>

            <path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2zm10-1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1z"/>
          </svg>
          Documentation
        </a>
      </div>
    </div>
  </div>

  <footer>
    Developed by <span>Royal Bengal AI</span>
  </footer>

</body>
</html>
